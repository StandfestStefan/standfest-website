<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seite nicht gefunden – Standfest Digital</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-content { max-width: 480px; }
    .error-code {
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      opacity: 0.3;
      margin-bottom: 0.5rem;
    }
    .error-content h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .error-content p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .error-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-links a {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9375rem;
      text-decoration: none;
      transition: all 0.2s;
    }
    .error-links .btn-primary {
      background: var(--accent);
      color: var(--text-on-accent);
    }
    .error-links .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }
    .error-links .btn-outline {
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
    }
    .error-links .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <a href="#main-content" class="skip-link">Zum Inhalt springen</a>
  <nav class="nav" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Standfest <span>Digital</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/leistungen.html">Leistungen</a></li>
        <li><a href="/pakete.html">Pakete</a></li>
        <li><a href="/kontakt.html">Kontakt</a></li>
        <li><a href="/audit-buchen.html" class="nav-cta">Audit buchen</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Menü" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1>Seite nicht gefunden</h1>
      <p>Die angeforderte Seite existiert nicht oder wurde verschoben. Kein Problem – hier geht's weiter.</p>
      <div class="error-links">
        <a href="/" class="btn-primary">Zur Startseite</a>
        <a href="/kontakt.html" class="btn-outline">Kontakt aufnehmen</a>
      </div>
    </div>
  </main>

  <script src="/js/main.js" defer></script>
</body>
</html>
