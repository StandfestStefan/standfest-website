# Security Headers Snippet (Standfest-Default, WELLE 3 P0-8, 2026-05-25)
# Include in server block: include /etc/nginx/snippets/security-headers.conf;
#
# Ziel: A+ Score auf securityheaders.com + Mozilla Observatory.
# Harmoniert mit Validator V28 Test-MegaOneCspStrict (CSP-Strict-Pattern:
# 'strict-dynamic' + nonce, kein 'unsafe-inline').
#
# STEFAN-TO-DO nach Deploy:
#   1. nginx -t ; systemctl reload nginx
#   2. HSTS-Preload-Submission: https://hstspreload.org/?domain=standfestdigital.at
#      (Pflicht-Vorbedingungen: max-age >= 31536000, includeSubDomains, preload,
#       HTTPS auf allen Subdomains. Bestaetigt erst nach Eintrag in Chrome-Liste,
#       Frist 6-12 Wochen.)
#   3. CSP-Nonce-Injection: Phase 5 HTML-Agent emittiert Meta-Tag mit Nonce.
#      Falls Header zusaetzlich pro Request injiziert werden soll, nginx via
#      $request_id ableiten (Pattern siehe agents/v2/website-security.md Z.380+).
#
# ANTI-CLICKJACKING: X-Frame-Options DENY (haerter als SAMEORIGIN, frame-ancestors 'none' in CSP).
# ANTI-MIME-SNIFF: X-Content-Type-Options nosniff.
# ANTI-XSS-LEGACY: X-XSS-Protection 0 (deprecated, Browser-Engine-Bug, 0 ist heute sicherer als 1).
# CROSS-ORIGIN-ISOLATION: COOP same-origin + COEP credentialless + CORP same-origin.
#   Erlaubt SharedArrayBuffer, schuetzt vor Spectre-side-channels.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy: 12 Direktiven (von 3 hochgezogen).
# Standfest-Default ist KEIN Zugriff auf Browser-APIs. Branchen koennen
# einzeln freischalten via per-Site-Override (siehe security-Agent-Doku).
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), fullscreen=(self), picture-in-picture=(self), midi=(), bluetooth=()" always;

# Strict-Transport-Security mit preload-Direktive.
# WICHTIG: nach Submission auf hstspreload.org wird die Domain in der
# Chromium-Liste hartkodiert. Rueckwaerts-Entfernung dauert Monate.
# Voraussetzung: alle Subdomains MUESSEN HTTPS sprechen.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Cross-Origin-Opener-Policy: process isolation, schuetzt window.opener.
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Cross-Origin-Resource-Policy: andere Origins koennen Standfest-Assets
# nicht ohne CORS einbetten. 'same-origin' ist die strikteste Variante.
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Cross-Origin-Embedder-Policy: 'credentialless' erlaubt Cross-Origin-Bilder
# ohne CORP-Header (Subset von 'require-corp'). Notwendig fuer
# COOP+COEP-Isolation-Status. Wenn extern eingebundene Resources Probleme
# machen, auf 'unsafe-none' downgraden (verliert dann Isolation-Boost).
add_header Cross-Origin-Embedder-Policy "credentialless" always;

# Content-Security-Policy CSP-Strict-Pattern (V28-konform):
#   - script-src: 'strict-dynamic' + nonce, KEIN 'unsafe-inline', KEIN 'unsafe-eval'.
#     Mit 'strict-dynamic' werden CDN-Whitelists (googletagmanager etc.) durch
#     vom Nonce-getragenen Script transitiv erlaubt. Browser ignoriert Host-Allowlist.
#   - style-src: nonce-basiert, KEIN 'unsafe-inline'. style="..." Attribute sind
#     damit verboten (HTML-Agent migriert in <style nonce>).
#   - object-src 'none': blockt Flash/Plugins (XSS-Hebel).
#   - base-uri 'self': verhindert <base>-Hijacking.
#   - form-action 'self': Formulare gehen nur an eigene Origin.
#   - frame-ancestors 'none': zusaetzlich zu X-Frame-Options, fuer modern browsers.
#   - upgrade-insecure-requests: erzwingt HTTPS auch fuer relative HTTP-Links.
#   - report-to: Violations gehen an /csp-report-endpoint (Stefan kann Endpoint via
#     n8n-Webhook oder report-uri.com einrichten - PROD-To-Do).
#
# NONCE-PLACEHOLDER: $csp_nonce wird per nginx-Map oder $request_id pro Request
# gesetzt. Pflichten-Pattern (Beispiel im Server-Block):
#   set $csp_nonce $request_id;
#   sub_filter '__CSP_NONCE__' '$csp_nonce';
# HTML-Agent emittiert sowohl Meta-Tag als auch Server-injected Header. Wenn
# Server-Side Nonce-Sync nicht eingerichtet ist: Meta-Tag dominiert (Agent-Default).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'strict-dynamic' 'nonce-__CSP_NONCE__' https:; style-src 'self' 'nonce-__CSP_NONCE__'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://n8n.standfestdigital.at; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
# Backward-Compat-Note: 'strict-dynamic' wird von Chrome 52+, Firefox 52+,
# Safari 15.4+ unterstuetzt. Alte Browser ohne strict-dynamic-Support
# (IE/Edge-Legacy/Safari <15.4) fallen auf 'self'-only zurueck (sicher).
# Validator V28 prueft auf strict-dynamic + nonce + Abwesenheit von 'unsafe-inline'.
