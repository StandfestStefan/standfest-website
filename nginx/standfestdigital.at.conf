# ══════════════════════════════════════════════════
# Standfest Digital – Nginx Server Configuration
# Server: Hetzner VPS (168.119.173.11)
# Domain: standfestdigital.at
# SSL: Let's Encrypt (certbot)
# ══════════════════════════════════════════════════

# ── HTTP → HTTPS Redirect ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name standfestdigital.at www.standfestdigital.at;
    return 301 https://standfestdigital.at$request_uri;
}

# ── www → non-www Redirect ───────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.standfestdigital.at;

    ssl_certificate /etc/letsencrypt/live/standfestdigital.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/standfestdigital.at/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://standfestdigital.at$request_uri;
}

# ── Main Server Block ────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name standfestdigital.at;

    # ── SSL (Let's Encrypt) ──────────────────────
    ssl_certificate /etc/letsencrypt/live/standfestdigital.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/standfestdigital.at/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Root & Index ─────────────────────────────
    root /var/www/standfestdigital.at;
    index index.html;

    # ── Security Headers ─────────────────────────
    include /etc/nginx/snippets/security-headers.conf;

    # ── Gzip Compression ─────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Cache Headers ────────────────────────────
    # HTML: Kein Cache (Updates sofort wirksam)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ =404;
    }

    # Statische Assets: 1 Jahr Cache
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Hauptroute ───────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── 404-Handling ─────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── robots.txt & sitemap.xml ─────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    location = /sitemap.xml {
        access_log off;
    }

    # ── Deny hidden files ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Access & Error Logs ──────────────────────
    access_log /var/log/nginx/standfestdigital.at.access.log;
    error_log /var/log/nginx/standfestdigital.at.error.log;
}
